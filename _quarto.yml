project:
  type: website
  output-dir: docs
  pre-render:
    - python3 scripts/build_home.py

website:
  title: "Computational Notes"
  site-url: "https://eniktab.github.io/computational-notes/"
  navbar:
    left:
      - text: Home
        href: index.qmd
      - text: Posts
        href: blog.qmd
      - text: About
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/eniktab/computational-notes
        aria-label: Star on GitHub

format:
  html:
    theme: default
    css: styles.css
    toc: false
    include-after-body: includes/post-feedback.html
